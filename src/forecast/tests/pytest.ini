[pytest]
# v3 tests. The default config (forecast.architecture="tft" with default
# training.optimizer="adamw") emits no warnings. Filters are conservative
# — we intentionally do NOT ignore UserWarning globally because several
# validation rules are warning-based and their emission is asserted by
# tests.
filterwarnings =
    # pydantic 2.11 deprecation emitted by torch<->pydantic adapters on import.
    ignore::DeprecationWarning

# Markers used in the v3 suite.
markers =
    slow: heavy tests (training smoke, bit-identical reproducibility)
