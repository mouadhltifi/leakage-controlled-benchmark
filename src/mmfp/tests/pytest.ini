[pytest]
# The default config (lookback=1 + price_encoder="lstm") triggers a
# deliberate UserWarning at validation time. It's the spec-required
# behaviour for this combination; tests that load defaults needn't treat
# it as a failure.
filterwarnings =
    ignore:data.lookback=1 with model.price_encoder=.lstm.*:UserWarning

# Markers used in the suite.
markers =
    slow: heavy loader tests (FNSPID CSV, large parquet scans)
