# Canonical v3 defaults for every forecast experiment.
#
# Paired with ``forecast.config.defaults.DEFAULT_CONFIG``. The two must agree
# field-for-field; a round-trip test enforces parity.
#
# Precedence when merged by ``forecast.config.load.load_config``:
#   defaults.toml < experiment.toml < CLI --set key=value
#
# v3 overrides vs v2 defaults (see the architecture spec):
#   data.lookback           : 1      -> 60       (TFT window)
#   news.encoder            : 11dim  -> qwen3    (scope lock)
#   news.pca_dims           : 32     -> 128      (scope lock)
#   training.min_epochs     : 0      -> 20       (VSN needs >=10 epochs)
#   training.learning_rate  : 1e-4   -> 3e-4     (TFT paper mid-band)
#   training.weight_decay   : 1e-5   -> 1e-4     (AdamW decoupled)
#   training.optimizer      : adam   -> adamw    (decoupled weight decay)
#
# All other v2 defaults are preserved for continuity with the reused v2
# trainer / runner / dataset machinery.

name = "default_v3"
seed = 42
device = "auto"

[data]
universe = "sp500_sector_55"
start_date = "2015-02-03"  # First dynamic-graph snapshot date; avoids first-month gap
end_date = "2023-12-31"
fold_idx = 0
lookback = 60              # v3: TFT window
deadzone = 0.005
warmup_days = 252

[price]
enabled = true

[news]
enabled = false
encoder = "qwen3_embedding"           # v3 scope lock
aggregation = "arithmetic_mean"
pca_dims = 128                         # v3 scope lock (up from v2's 32)
pca_train_end = ""                     # "" = use fold train end (per-fold PCA)
log1p_volume = true
dispersion_feature = false
empty_day_policy = "zero_fill_has_news_flag"
lag_days = 1

[social]
enabled = false
aggregation_window = 3
log1p_volume = true
lag_days = 1

[macro]
enabled = false
fomc_window = 1

[graph]
enabled = false
source = "static_gics"
dynamic_window = 20
dynamic_threshold = 0.3
dynamic_refresh_every = 20

[standardization]
price = true
macro = true
news = true
social = true
graph_node = true
fit_scope = "train_fold_only"

# v2 ``[model]`` block retained for runner-dispatch compatibility; ignored
# by the v3 TFT predictor.
[model]
hidden_dim = 64
dropout = 0.2
num_heads = 4
price_encoder = "lstm"
price_lstm_layers = 2
tabular_hidden_layers = 1
graph_gat_heads = 4
graph_gat_layers = 2

# v2 ``[fusion]`` block retained; unused under architecture="tft".
[fusion]
strategy = "concat"
primary_modality = "price"

# v2 ``[head]`` block retained; unused under architecture="tft".
[head]
architecture = "parallel_multitask"
targets = ["direction", "return"]
mtl_alpha = 0.5
cascade_reg_target = "return"
detach_cascade = false

[training]
batch_size = 64
max_epochs = 150
min_epochs = 20            # v3: TFT needs >=10 epochs to escape VSN uniform init
patience = 30
grad_clip = 1.0
learning_rate = 3e-4       # v3: up from 1e-4
weight_decay = 1e-4        # v3: up from 1e-5 (AdamW decoupled)
optimizer = "adamw"        # v3: AdamW
scheduler = "cosine_warm_restarts"
class_weights = "inverse_frequency"
val_fraction = 0.2

[intraday]
enabled = false
frequency = "daily"
source = "none"

[logging]
level = "INFO"
per_epoch_log_every = 10

[forecast]
architecture = "tft"
hidden_dim = 64
n_heads = 1
n_lstm_layers = 1
dropout = 0.3
lookback = 60
quantiles = [0.1, 0.25, 0.5, 0.75, 0.9]
direction_aux_weight = 0.0
volatility_aux_weight = 0.0
graph_precompute = true
graph_node_dim = 64
n_tickers = 55
n_sectors = 11
warmup_epochs = 5
